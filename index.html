<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanical v6.1 | AI Integrated</title>
    <style>
        :root { --teal: #4bdad8; --bg: #0a0f0f; --card: #0d1414; --text: #dce8e7; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 260px; background: var(--card); border-right: 1px solid #ffffff10; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 900; color: var(--teal); margin-bottom: 40px; letter-spacing: -1px; }
        
        .nav-btn { background: none; border: none; color: #64748b; padding: 12px 15px; text-align: left; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 8px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-btn.active { background: #4bdad815 !important; color: var(--teal) !important; border-left-color: var(--teal) !important; }

        .lang-box { display: flex; background: #000; padding: 4px; border-radius: 8px; margin-top: auto; }
        .l-btn { flex: 1; background: none; border: none; color: #475569; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .l-btn.active { background: var(--teal) !important; color: #002d2d !important; }

        main { flex-grow: 1; padding: 60px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .container { width: 100%; max-width: 700px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0 0 10px; }
        
        textarea { width: 100%; height: 220px; background: #131b1b; border: 1px solid #ffffff10; border-radius: 15px; padding: 20px; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; resize: none; }
        textarea:focus { border-color: var(--teal); }
        
        .go-btn { width: 100%; background: var(--teal); color: #002d2d; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .go-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        #results { margin-top: 30px; display: none; width: 100%; }
        .out { background: #ffffff05; border: 1px solid #4bdad825; padding: 20px; border-radius: 15px; color: #bbf6f5; white-space: pre-wrap; margin-bottom: 20px; line-height: 1.5; }
        .stats { display: flex; gap: 15px; }
        .stat { flex: 1; background: #ffffff03; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #ffffff05; }
        .label { display: block; font-size: 10px; font-weight: 800; color: #475569; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 20px; font-weight: 700; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">BOTANICAL</div>
        <div style="flex-grow: 1;">
            <button id="m-semantic" class="nav-btn active" onclick="setMode('semantic')">Semantic</button>
            <button id="m-xml" class="nav-btn" onclick="setMode('xml')">XML (Claude)</button>
            <button id="m-aggressive" class="nav-btn" onclick="setMode('aggressive')">Aggressive</button>
            <button id="m-ai" class="nav-btn" onclick="setMode('free-ai')">✨ Free AI (Mistral)</button>
        </div>
        
        <div class="lang-box">
            <button id="l-en" class="l-btn active" onclick="setLang('en')">EN</button>
            <button id="l-ja" class="l-btn" onclick="setLang('ja')">日本語</button>
        </div>
    </aside>

    <main>
        <div class="container">
            <h1 id="h1-text">Optimize Prompt</h1>
            <p id="p-text" style="color:#64748b; margin-bottom: 30px;">Compressing logic to save tokens and prevent lockouts.</p>
            
            <textarea id="input-box" placeholder="Paste your prompt here..."></textarea>
            <button class="go-btn" id="btn-text" onclick="handleRun()">COMPRESS & OPTIMIZE</button>

            <div id="results">
                <div class="out" id="output-box"></div>
                <div class="stats">
                    <div class="stat"><span class="label" id="s1-text">Original</span><div class="val" id="v-old">0</div></div>
                    <div class="stat"><span class="label" id="s2-text">Compressed</span><div class="val" id="v-new" style="color:var(--teal)">0</div></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'semantic';
        let currentLang = 'en';

        const i18n = {
            en: { h1: "Optimize Prompt", p: "Compressing logic to save tokens.", btn: "COMPRESS & OPTIMIZE", s1: "Original", s2: "Compressed" },
            ja: { h1: "プロンプト最適化", p: "トークンを節約し制限を回避。", btn: "圧縮して実行", s1: "元サイズ", s2: "圧縮後" }
        };

        function setLang(l) {
            currentLang = l;
            document.getElementById('l-en').classList.toggle('active', l === 'en');
            document.getElementById('l-ja').classList.toggle('active', l === 'ja');
            document.getElementById('h1-text').innerText = i18n[l].h1;
            document.getElementById('p-text').innerText = i18n[l].p;
            document.getElementById('btn-text').innerText = i18n[l].btn;
            document.getElementById('s1-text').innerText = i18n[l].s1;
            document.getElementById('s2-text').innerText = i18n[l].s2;
        }

        function setMode(m) {
            currentMode = m;
            ['semantic', 'xml', 'aggressive', 'ai'].forEach(id => {
                const el = document.getElementById('m-' + id);
                if(el) el.classList.toggle('active', (id === m || (id === 'ai' && m === 'free-ai')));
            });
        }

        async function handleRun() {
            const raw = document.getElementById('input-box').value;
            if(!raw) return;
            
            let result = "";
            const btn = document.getElementById('btn-text');
            const originalText = btn.innerText;

            if (currentMode === 'free-ai') {
                btn.innerText = "AI THINKING...";
                try {
                    const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                        headers: { Authorization: "Bearer YOUR_HF_TOKEN_HERE" }, // Replace with your token
                        method: "POST",
                        body: JSON.stringify({ inputs: `[INST] Rewrite this to be as short as possible for an AI prompt: ${raw} [/INST]` }),
                    });
                    const data = await response.json();
                    result = data[0].generated_text.split('[/INST]')[1].trim();
                } catch (e) {
                    result = "Error: Please check your AI API token.";
                }
            } else if (currentMode === 'aggressive') {
                // Force count down by stripping stop-words
                result = raw.replace(/could you please|can you please|i want you to|give suggestions on/gi, "")
                            .replace(/\b(the|a|an|is|are|of|to|that|it|its|so|very|actually)\b/gi, "")
                            .replace(/\s\s+/g, ' ').trim();
            } else if (currentMode === 'xml') {
                result = `<ctx>${raw.trim()}</ctx>\n<tsk>Do</tsk>`;
            } else {
                result = `Task: ${raw.trim()}`;
            }

            btn.innerText = originalText;
            document.getElementById('output-box').innerText = result;
            document.getElementById('v-old').innerText = raw.length;
            document.getElementById('v-new').innerText = result.length;
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
