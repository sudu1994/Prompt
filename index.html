<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompressor v4.0 | Zero-Token Engine</title>
    <style>
        :root { --accent: #4bdad8; --bg: #0a0f0f; --card: #0d1414; --text: #dce8e7; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Navigation */
        aside { width: 280px; background: var(--card); border-right: 1px solid #ffffff10; display: flex; flex-direction: column; padding: 24px; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: -1px; margin-bottom: 40px; }
        .nav-group { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .btn { background: transparent; border: none; color: #64748b; padding: 14px 16px; text-align: left; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; }
        .btn:hover { background: #ffffff05; }
        .btn.active { background: #4bdad815; color: var(--accent); border-left-color: var(--accent); }
        
        /* Language Toggle */
        .lang-switch { display: flex; background: #000; padding: 4px; border-radius: 10px; margin-top: auto; }
        .l-btn { flex: 1; border: none; background: transparent; color: #475569; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .l-btn.active { background: var(--accent); color: #002d2d; }

        /* Main Workspace */
        main { flex-grow: 1; padding: 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        h1 { font-size: 42px; font-weight: 800; margin: 0 0 8px 0; letter-spacing: -1px; }
        p { color: #64748b; margin-bottom: 32px; font-weight: 500; }
        
        textarea { width: 100%; height: 220px; background: #131b1b; border: 1px solid #ffffff10; border-radius: 20px; padding: 20px; color: #fff; font-size: 16px; line-height: 1.6; outline: none; transition: 0.3s; box-sizing: border-box; resize: none; }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px #4bdad810; }
        
        .action-btn { width: 100%; background: var(--accent); color: #002d2d; border: none; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 24px; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .action-btn:active { transform: translateY(0); }

        /* Results Area */
        #result-area { margin-top: 40px; display: none; width: 100%; }
        .output-box { background: #ffffff05; border: 1px solid #4bdad830; padding: 24px; border-radius: 20px; color: #bbf6f5; font-size: 16px; white-space: pre-wrap; line-height: 1.6; margin-bottom: 24px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stat-card { background: #ffffff03; border: 1px solid #ffffff05; padding: 20px; border-radius: 16px; text-align: center; }
        .stat-label { display: block; font-size: 10px; font-weight: 800; color: #475569; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 24px; font-weight: 700; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">Kompressor</div>
        <nav class="nav-group">
            <button class="btn active" onclick="setMode('semantic', this)" id="btn-sem">Semantic</button>
            <button class="btn" onclick="setMode('xml', this)" id="btn-xml">XML (Claude)</button>
            <button class="btn" onclick="setMode('aggressive', this)" id="btn-agg">Aggressive</button>
        </nav>
        
        <div class="lang-switch">
            <button class="l-btn active" onclick="setLang('en', this)">EN</button>
            <button class="l-btn" onclick="setLang('ja', this)">日本語</button>
        </div>
    </aside>

    <main>
        <div class="container">
            <h1 id="ui-title">Optimize Prompt</h1>
            <p id="ui-sub">Save tokens and bypass 3-hour lockouts.</p>
            
            <textarea id="input" placeholder="Paste your draft here..."></textarea>
            
            <button class="action-btn" onclick="process()" id="ui-btn">COMPRESS & OPTIMIZE</button>

            <div id="result-area">
                <div class="output-box" id="output"></div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label" id="ui-s1">Original Chars</span>
                        <div class="stat-val" id="v-old">0</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label" id="ui-s2">Compressed</span>
                        <div class="stat-val" id="v-new" style="color:var(--accent)">0</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'semantic';
        let currentLang = 'en';

        const i18n = {
            en: { title: "Optimize Prompt", sub: "Save tokens and bypass 3-hour lockouts.", btn: "COMPRESS & OPTIMIZE", s1: "Original", s2: "Compressed" },
            ja: { title: "プロンプト最適化", sub: "トークンを節約し、3時間制限を回避。", btn: "圧縮して実行", s1: "元サイズ", s2: "圧縮後" }
        };

        function setMode(m, el) {
            currentMode = m;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function setLang(l, el) {
            currentLang = l;
            document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('ui-title').innerText = i18n[l].title;
            document.getElementById('ui-sub').innerText = i18n[l].sub;
            document.getElementById('ui-btn').innerText = i18n[l].btn;
            document.getElementById('ui-s1').innerText = i18n[l].s1;
            document.getElementById('ui-s2').innerText = i18n[l].s2;
        }

        function process() {
            const input = document.getElementById('input').value;
            if(!input) return;

            let res = input;

            if(currentMode === 'aggressive') {
                // Remove social lubricants and common stop-words
                res = res.replace(/could you please|can you please|i was wondering if|i would like to|please|thank you/gi, "")
                         .replace(/\b(the|a|an|is|are|of|to|that)\b/gi, "")
                         .replace(/\s\s+/g, ' ').trim();
            } else if(currentMode === 'xml') {
                res = `<ctx>${res.trim()}</ctx>\n<task>Process</task>`;
            } else {
                // Semantic mode: simple structure
                res = `Task: ${res.trim()}`;
            }

            document.getElementById('output').innerText = res;
            document.getElementById('v-old').innerText = input.length;
            document.getElementById('v-new').innerText = res.length;
            document.getElementById('result-area').style.display = 'block';
        }
    </script>
</body>
</html>
