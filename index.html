<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanical v5.0 | Final Audit</title>
    <style>
        :root { --teal: #4bdad8; --bg: #0a0f0f; --card: #0d1414; --text: #dce8e7; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        /* Sidebar Navigation */
        aside { width: 260px; background: var(--card); border-right: 1px solid #ffffff10; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 900; color: var(--teal); margin-bottom: 40px; letter-spacing: -1px; }
        
        .nav-btn { background: none; border: none; color: #64748b; padding: 12px 15px; text-align: left; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 8px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-btn.active { background: #4bdad815; color: var(--teal); border-left-color: var(--teal); }

        .lang-box { display: flex; background: #000; padding: 4px; border-radius: 8px; margin-top: auto; }
        .l-btn { flex: 1; background: none; border: none; color: #475569; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .l-btn.active { background: var(--teal); color: #002d2d; }

        /* Workspace */
        main { flex-grow: 1; padding: 60px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .container { width: 100%; max-width: 700px; }
        h1 { font-size: 36px; font-weight: 800; margin: 0 0 10px; }
        p { color: #64748b; margin-bottom: 30px; }
        
        textarea { width: 100%; height: 200px; background: #131b1b; border: 1px solid #ffffff10; border-radius: 15px; padding: 20px; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; resize: none; }
        textarea:focus { border-color: var(--teal); }
        
        .go-btn { width: 100%; background: var(--teal); color: #002d2d; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 20px; }

        /* Results Area */
        #results { margin-top: 30px; display: none; }
        .out { background: #ffffff05; border: 1px solid #4bdad825; padding: 20px; border-radius: 15px; color: #bbf6f5; white-space: pre-wrap; margin-bottom: 20px; line-height: 1.5; }
        .stats { display: flex; gap: 15px; }
        .stat { flex: 1; background: #ffffff03; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #ffffff05; }
        .label { display: block; font-size: 10px; font-weight: 800; color: #475569; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 20px; font-weight: 700; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">BOTANICAL</div>
        <div style="flex-grow: 1;">
            <button id="m-semantic" class="nav-btn active" onclick="setM('semantic')">Semantic</button>
            <button id="m-xml" class="nav-btn" onclick="setM('xml')">XML (Claude)</button>
            <button id="m-aggressive" class="nav-btn" onclick="setM('aggressive')">Aggressive</button>
        </div>
        
        <div class="lang-box">
            <button id="l-en" class="l-btn active" onclick="setL('en')">EN</button>
            <button id="l-ja" class="l-btn" onclick="setL('ja')">日本語</button>
        </div>
    </aside>

    <main>
        <div class="container">
            <h1 id="t-h1">Optimize Prompt</h1>
            <p id="t-p">Compressing logic to save tokens.</p>
            
            <textarea id="input" placeholder="Paste text here..."></textarea>
            <button class="go-btn" id="t-btn" onclick="run()">COMPRESS & OPTIMIZE</button>

            <div id="results">
                <div class="out" id="output"></div>
                <div class="stats">
                    <div class="stat">
                        <span class="label" id="t-s1">Original</span>
                        <div class="val" id="v-old">0</div>
                    </div>
                    <div class="stat">
                        <span class="label" id="t-s2">Compressed</span>
                        <div class="val" id="v-new" style="color:var(--teal)">0</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let mode = 'semantic';
        let lang = 'en';

        const i18n = {
            en: { h1: "Optimize Prompt", p: "Compressing logic to save tokens.", btn: "COMPRESS & OPTIMIZE", s1: "Original", s2: "Compressed" },
            ja: { h1: "プロンプト最適化", p: "トークンを節約し制限を回避。", btn: "圧縮して実行", s1: "元サイズ", s2: "圧縮後" }
        };

        function setL(l) {
            lang = l;
            document.getElementById('l-en').className = (l === 'en' ? 'l-btn active' : 'l-btn');
            document.getElementById('l-ja').className = (l === 'ja' ? 'l-btn active' : 'l-btn');
            document.getElementById('t-h1').innerText = i18n[l].h1;
            document.getElementById('t-p').innerText = i18n[l].p;
            document.getElementById('t-btn').innerText = i18n[l].btn;
            document.getElementById('t-s1').innerText = i18n[l].s1;
            document.getElementById('t-s2').innerText = i18n[l].s2;
        }

        function setM(m) {
            mode = m;
            ['semantic', 'xml', 'aggressive'].forEach(id => {
                document.getElementById('m-' + id).className = (id === m ? 'nav-btn active' : 'nav-btn');
            });
        }

        function run() {
            const val = document.getElementById('input').value;
            if(!val) return;
            
            let res = val;

            if (mode === 'aggressive') {
                // Real compression: Deletes filler words so count drops
                res = res.replace(/could you please|can you please|i was wondering if|i want you to|give suggestions on/gi, "")
                         .replace(/\b(the|a|an|is|are|of|to|that|it|its|so|very|actually)\b/gi, "")
                         .replace(/\s\s+/g, ' ').trim();
            } else if (mode === 'xml') {
                res = `<ctx>${res.trim()}</ctx>\n<tsk>Do</tsk>`;
            } else {
                res = `Task: ${res.trim()}`;
            }

            document.getElementById('output').innerText = res;
            document.getElementById('v-old').innerText = val.length;
            document.getElementById('v-new').innerText = res.length;
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
