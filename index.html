<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanical | Hugging Face AI Edition</title>
    <style>
        :root { --teal: #4bdad8; --bg: #0a0f0f; --card: #0d1414; --text: #dce8e7; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        aside { width: 260px; background: var(--card); border-right: 1px solid #ffffff10; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 900; color: var(--teal); margin-bottom: 40px; }
        .nav-btn { background: none; border: none; color: #64748b; padding: 12px 15px; text-align: left; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 8px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-btn.active { background: #4bdad815 !important; color: var(--teal) !important; border-left-color: var(--teal) !important; }
        .lang-box { display: flex; background: #000; padding: 4px; border-radius: 8px; margin-top: auto; }
        .l-btn { flex: 1; background: none; border: none; color: #475569; padding: 8px; font-size: 11px; font-weight: 800; cursor: pointer; border-radius: 6px; }
        .l-btn.active { background: var(--teal) !important; color: #002d2d !important; }
        main { flex-grow: 1; padding: 60px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .container { width: 100%; max-width: 700px; }
        textarea { width: 100%; height: 220px; background: #131b1b; border: 1px solid #ffffff10; border-radius: 15px; padding: 20px; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; resize: none; margin-bottom: 20px; }
        .go-btn { width: 100%; background: var(--teal); color: #002d2d; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .go-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        #results { margin-top: 30px; display: none; width: 100%; }
        .out { background: #ffffff05; border: 1px solid #4bdad825; padding: 20px; border-radius: 15px; color: #bbf6f5; white-space: pre-wrap; margin-bottom: 20px; font-family: monospace; }
        .stats { display: flex; gap: 15px; }
        .stat { flex: 1; background: #ffffff03; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #ffffff05; }
        .val { font-size: 20px; font-weight: 700; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">BOTANICAL</div>
        <div style="flex-grow: 1;">
            <button id="m-semantic" class="nav-btn active" onclick="setMode('semantic')">Semantic</button>
            <button id="m-xml" class="nav-btn" onclick="setMode('xml')">XML (Claude)</button>
            <button id="m-aggressive" class="nav-btn" onclick="setMode('aggressive')">Aggressive</button>
            <button id="m-hf" class="nav-btn" onclick="setMode('hf-ai')">✨ Hugging Face AI</button>
        </div>
        <div class="lang-box">
            <button id="l-en" class="l-btn active" onclick="setLang('en')">EN</button>
            <button id="l-ja" class="l-btn" onclick="setLang('ja')">日本語</button>
        </div>
    </aside>

    <main>
        <div class="container">
            <h1 id="h1-text">Optimize Prompt</h1>
            <p id="p-text" style="color:#64748b; margin-bottom: 30px;">Professional token reduction for AWS and development.</p>
            <textarea id="input-box" placeholder="Paste your text here..."></textarea>
            <button class="go-btn" id="btn-text" onclick="handleRun()">COMPRESS & OPTIMIZE</button>
            <div id="results">
                <div class="out" id="output-box"></div>
                <div class="stats">
                    <div class="stat"><span style="font-size:10px; color:#475569;">ORIGINAL</span><div class="val" id="v-old">0</div></div>
                    <div class="stat"><span style="font-size:10px; color:#475569;">COMPRESSED</span><div class="val" id="v-new" style="color:var(--teal)">0</div></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'semantic', currentLang = 'en';
        const texts = {
            en: { h1: "Optimize Prompt", p: "Professional token reduction for AWS and development.", btn: "COMPRESS & OPTIMIZE" },
            ja: { h1: "プロンプト最適化", p: "AWSと開発向けの高度なトークン削減。", btn: "圧縮して実行" }
        };

        function setLang(l) {
            currentLang = l;
            document.getElementById('l-en').classList.toggle('active', l === 'en');
            document.getElementById('l-ja').classList.toggle('active', l === 'ja');
            document.getElementById('h1-text').innerText = texts[l].h1;
            document.getElementById('p-text').innerText = texts[l].p;
            document.getElementById('btn-text').innerText = texts[l].btn;
        }

        function setMode(m) {
            currentMode = m;
            ['semantic', 'xml', 'aggressive', 'hf'].forEach(id => {
                const el = document.getElementById('m-' + id);
                if(el) el.classList.toggle('active', (id === m || (id === 'hf' && m === 'hf-ai')));
            });
        }

        async function handleRun() {
            const raw = document.getElementById('input-box').value.trim();
            if(!raw) return;
            const btn = document.getElementById('btn-text');
            btn.innerText = "AI PROCESSING...";

            let result = "";
            if (currentMode === 'hf-ai') {
                try {
                    const res = await fetch("/api/compress", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt: raw })
                    });
                    const data = await res.json();
                    result = data.result || "AI Response Error.";
                } catch { result = "Check Vercel Environment Variables."; }
            } else if (currentMode === 'aggressive') {
                result = raw.replace(/\b(the|a|an|is|are|of|to|that|it|its|please|kindly|could|would)\b/gi, "").replace(/\s\s+/g, ' ').trim();
            } else if (currentMode === 'xml') {
                result = `<ctx>${raw}</ctx>\n<tsk>Do</tsk>`;
            } else {
                result = `Task: ${raw}`;
            }

            btn.innerText = texts[currentLang].btn;
            document.getElementById('output-box').innerText = result;
            document.getElementById('v-old').innerText = raw.length;
            document.getElementById('v-new').innerText = result.length;
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
