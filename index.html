<aside class="w-64 border-r border-white/5 flex flex-col hidden md:flex sticky top-0 h-screen bg-[#0d1414]">
    <div class="p-8">
        <h1 class="font-['Manrope'] font-extrabold text-2xl text-[#4bdad8] tracking-tighter">BOTANICAL</h1>
        <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase mt-1" data-key="version">Semantic Engine v3.1</p>
    </div>
    
    <nav class="flex-grow px-4 space-y-2">
        <button onclick="setMode('semantic')" id="m-semantic" class="nav-btn active">
            <span class="material-symbols-outlined">psychology</span> <span data-key="mode-semantic">Semantic</span>
        </button>
        <button onclick="setMode('xml')" id="m-xml" class="nav-btn">
            <span class="material-symbols-outlined">code</span> <span data-key="mode-xml">XML (Claude)</span>
        </button>
        <button onclick="setMode('aggressive')" id="m-aggressive" class="nav-btn">
            <span class="material-symbols-outlined">bolt</span> <span data-key="mode-aggressive">Aggressive</span>
        </button>
    </nav>

    <div class="p-6 border-t border-white/5">
        <p class="text-[10px] font-bold text-slate-500 mb-2" data-key="lang-label">LANGUAGE / 言語</p>
        <div class="flex p-1 bg-black rounded-lg relative">
            <button id="l-en" onclick="setLang('en')" class="lang-btn active">EN</button>
            <button id="l-ja" onclick="setLang('ja')" class="lang-btn">日本語</button>
        </div>
    </div>
</aside>

<main class="flex-grow p-8 lg:p-16 max-w-5xl mx-auto w-full">
    <header class="mb-12">
        <h2 class="text-4xl font-['Manrope'] font-extrabold tracking-tight" data-key="title">Optimize Prompt</h2>
        <p class="text-slate-400 mt-2" data-key="subtitle">Compressing logic to save tokens and prevent lockouts.</p>
    </header>

    <section class="space-y-6">
        <textarea id="input" class="w-full h-64 bg-[#131b1b] border border-white/5 rounded-2xl p-6" data-placeholder="placeholder"></textarea>
        
        <button onclick="process()" class="w-full bg-[#4bdad8] text-[#002d2d] py-5 rounded-2xl font-extrabold text-xl" data-key="btn-run">
            COMPRESS & OPTIMIZE
        </button>
    </section>
</main>
