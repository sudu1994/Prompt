<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompressor v3.6 | Final Audit</title>
    <style>
        :root { --teal: #4bdad8; --bg: #0a0f0f; --panel: #0d1414; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #dce8e7; display: flex; min-height: 100vh; }
        aside { width: 260px; background: var(--panel); border-right: 1px solid #ffffff10; padding: 20px; display: flex; flex-direction: column; }
        .nav-btn { background: none; border: none; color: #64748b; padding: 12px; text-align: left; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 5px; border-left: 4px solid transparent; }
        .nav-btn.active { background: #4bdad815; color: var(--teal); border-left-color: var(--teal); }
        main { flex-grow: 1; padding: 40px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 200px; background: #131b1b; border: 1px solid #ffffff10; border-radius: 12px; color: white; padding: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        .run-btn { width: 100%; background: var(--teal); color: #002d2d; border: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .run-btn:hover { filter: brightness(1.1); }
        .stats { display: flex; gap: 10px; margin-top: 20px; }
        .stat-card { flex: 1; background: #ffffff05; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #ffffff10; }
        .stat-label { font-size: 10px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
        #output { background: #ffffff08; padding: 20px; border-radius: 12px; border: 1px solid #4bdad830; color: #bbf6f5; white-space: pre-wrap; margin-top: 20px; display: none; }
        .lang-toggle { display: flex; background: black; border-radius: 8px; padding: 2px; margin-top: auto; }
        .l-btn { flex: 1; background: none; border: none; color: #64748b; padding: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .l-btn.active { background: var(--teal); color: #002d2d; border-radius: 6px; }
    </style>
</head>
<body>

    <aside>
        <h2 style="color:var(--teal); margin: 0 0 30px 0;">BOTANICAL</h2>
        <button onclick="setM('semantic')" id="m-semantic" class="nav-btn active">Semantic</button>
        <button onclick="setM('xml')" id="m-xml" class="nav-btn">XML (Claude)</button>
        <button onclick="setM('aggressive')" id="m-aggressive" class="nav-btn">Aggressive</button>
        
        <div class="lang-toggle">
            <button onclick="setL('en')" id="l-en" class="l-btn active">EN</button>
            <button onclick="setL('ja')" id="l-ja" class="l-btn">日本語</button>
        </div>
    </aside>

    <main>
        <h1 id="t-h1">Optimize Prompt</h1>
        <p id="t-p" style="color:#64748b">Compress idea to save Pro tokens.</p>
        
        <textarea id="input" placeholder="Paste your text here..."></textarea>
        <button class="run-btn" onclick="optimize()" id="t-btn">COMPRESS & OPTIMIZE</button>

        <div id="output"></div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-label" id="t-s1">ORIGINAL</span>
                <span id="v-old" style="font-weight:bold">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label" id="t-s2">COMPRESSED</span>
                <span id="v-new" style="font-weight:bold; color:var(--teal)">0</span>
            </div>
        </div>
    </main>

    <script>
        let mode = 'semantic';
        let lang = 'en';

        const txt = {
            en: { h1: "Optimize Prompt", p: "Compress idea to save Pro tokens.", btn: "COMPRESS & OPTIMIZE", s1: "ORIGINAL", s2: "COMPRESSED" },
            ja: { h1: "プロンプト最適化", p: "トークンを節約し制限を回避", btn: "圧縮して実行", s1: "元サイズ", s2: "圧縮後" }
        };

        function setL(l) {
            lang = l;
            document.getElementById('l-en').classList.toggle('active', l === 'en');
            document.getElementById('l-ja').classList.toggle('active', l === 'ja');
            document.getElementById('t-h1').innerText = txt[l].h1;
            document.getElementById('t-p').innerText = txt[l].p;
            document.getElementById('t-btn').innerText = txt[l].btn;
            document.getElementById('t-s1').innerText = txt[l].s1;
            document.getElementById('t-s2').innerText = txt[l].s2;
        }

        function setM(m) {
            mode = m;
            ['semantic', 'xml', 'aggressive'].forEach(x => {
                document.getElementById('m-'+x).classList.toggle('active', x === m);
            });
        }

        function optimize() {
            const val = document.getElementById('input').value;
            if(!val) return;

            let res = val;

            // FIX: Real compression logic that actually changes the count
            if(mode === 'aggressive') {
                res = res.toLowerCase()
                         .replace(/could you please|can you please|i was wondering if/gi, "")
                         .replace(/i want you to|give me a|tell me about/gi, "")
                         .replace(/\b(the|a|an|is|are|of|to)\b/gi, "")
                         .replace(/\s\s+/g, ' ').trim();
            } else if(mode === 'xml') {
                res = `<ctx>${res.trim()}</ctx>\n<task>Action</task>`;
            } else {
                res = `[Task]: ${res.trim()}`;
            }

            document.getElementById('output').innerText = res;
            document.getElementById('output').style.display = 'block';
            document.getElementById('v-old').innerText = val.length;
            document.getElementById('v-new').innerText = res.length;
        }
    </script>
</body>
</html>
