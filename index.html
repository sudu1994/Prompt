<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanical v3.0 | Semantic Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0f0f] text-[#dce8e7] flex min-h-screen font-['Inter']">

    <aside class="w-64 border-r border-white/5 flex flex-col hidden md:flex sticky top-0 h-screen bg-[#0d1414]">
        <div class="p-8">
            <h1 class="font-['Manrope'] font-extrabold text-2xl text-[#4bdad8] tracking-tighter">BOTANICAL</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase mt-1">Semantic Engine v3.0</p>
        </div>
        
       <nav class="flex-grow px-4 space-y-2">
    <button onclick="setMode('semantic')" id="m-semantic" class="nav-btn active bg-[#4bdad8]/10 text-[#4bdad8] border-l-4 border-[#4bdad8]">
        <span class="material-symbols-outlined">psychology</span> Semantic
    </button>
    <button onclick="setMode('xml')" id="m-xml" class="nav-btn">
        <span class="material-symbols-outlined">code</span> XML (Claude)
    </button>
    <button onclick="setMode('aggressive')" id="m-aggressive" class="nav-btn">
        <span class="material-symbols-outlined">bolt</span> Aggressive
    </button>
     </nav>

        <div class="p-6 border-t border-white/5">
            <div class="flex p-1 bg-black rounded-lg">
                <button id="l-en" onclick="setLang('en')" class="lang-btn active">EN</button>
                <button id="l-ja" onclick="setLang('ja')" class="lang-btn">JA</button>
            </div>
        </div>
    </aside>

    <main class="flex-grow p-8 lg:p-16 max-w-5xl mx-auto w-full">
        <header class="mb-12">
            <h2 class="text-4xl font-['Manrope'] font-extrabold tracking-tight">Optimize Prompt</h2>
            <p class="text-slate-400 mt-2">Compressing logic to save tokens and prevent 3-hour lockouts.</p>
        </header>

        <section class="space-y-6">
            <div class="relative">
                <textarea id="input" class="w-full h-64 bg-[#131b1b] border border-white/5 rounded-2xl p-6 focus:ring-2 focus:ring-[#4bdad8] outline-none transition-all placeholder:text-slate-600" placeholder="Paste your idea or code request here..."></textarea>
                <div id="char-count" class="absolute bottom-4 right-6 text-[10px] text-slate-500 font-mono uppercase">0 Chars</div>
            </div>

            <button onclick="process()" class="w-full bg-[#4bdad8] text-[#002d2d] py-5 rounded-2xl font-extrabold text-xl shadow-xl shadow-[#4bdad8]/10 hover:scale-[1.01] active:scale-[0.98] transition-all">
                COMPRESS & OPTIMIZE
            </button>

            <div id="result-box" class="hidden animate-in fade-in duration-500">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-[#4bdad8] tracking-widest uppercase">Result</span>
                    <button onclick="copyResult()" class="text-[#4bdad8] text-xs flex items-center gap-1 hover:underline">
                        <span class="material-symbols-outlined text-sm">content_copy</span> Copy
                    </button>
                </div>
                <div id="output" class="bg-white/5 border border-[#4bdad8]/20 rounded-2xl p-6 text-[#bbf6f5] font-medium whitespace-pre-wrap leading-relaxed"></div>
                
                <div class="grid grid-cols-3 gap-4 mt-6">
                    <div class="stat-card">
                        <label>Original</label>
                        <div id="stat-old">0</div>
                    </div>
                    <div class="stat-card">
                        <label>Compressed</label>
                        <div id="stat-new" class="text-[#4bdad8]">0</div>
                    </div>
                    <div class="stat-card border-[#4bdad8]/20">
                        <label>Saved</label>
                        <div id="stat-pct" class="text-emerald-400">0%</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="engine.js"></script>
</body>
</html>
