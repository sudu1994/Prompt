<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanical v3.3 | Fixed UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0f0f; color: #dce8e7; }
        /* Hard-coded UI States to ensure buttons always work */
        .btn-active { 
            background-color: rgba(75, 218, 216, 0.1) !important; 
            color: #4bdad8 !important; 
            border-left: 4px solid #4bdad8 !important; 
        }
        .lang-active { 
            background-color: #4bdad8 !important; 
            color: #002d2d !important; 
        }
        .nav-btn { transition: all 0.2s; border-left: 4px solid transparent; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r border-white/5 flex flex-col hidden md:flex sticky top-0 h-screen bg-[#0d1414]">
        <div class="p-8">
            <h1 class="font-['Manrope'] font-extrabold text-2xl text-[#4bdad8] tracking-tighter">BOTANICAL</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.2em] uppercase mt-1" data-key="version">Semantic Engine v3.3</p>
        </div>
        
        <nav class="flex-grow px-4 space-y-2">
            <button onclick="setMode('semantic')" id="m-semantic" class="nav-btn btn-active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold">
                <span class="material-symbols-outlined">psychology</span> <span data-key="mode-semantic">Semantic</span>
            </button>
            <button onclick="setMode('xml')" id="m-xml" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400">
                <span class="material-symbols-outlined">code</span> <span data-key="mode-xml">XML (Claude)</span>
            </button>
            <button onclick="setMode('aggressive')" id="m-aggressive" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400">
                <span class="material-symbols-outlined">bolt</span> <span data-key="mode-aggressive">Aggressive</span>
            </button>
        </nav>

        <div class="p-6 border-t border-white/5">
            <p class="text-[10px] font-bold text-slate-500 mb-2" data-key="lang-label">LANGUAGE</p>
            <div class="flex p-1 bg-black rounded-lg">
                <button id="l-en" onclick="setLang('en')" class="lang-btn lang-active flex-1 py-2 text-[10px] font-bold rounded transition-all">EN</button>
                <button id="l-ja" onclick="setLang('ja')" class="lang-btn flex-1 py-2 text-[10px] font-bold rounded text-slate-500 transition-all">日本語</button>
            </div>
        </div>
    </aside>

    <main class="flex-grow p-8 lg:p-16 max-w-5xl mx-auto w-full">
        <header class="mb-12">
            <h2 class="text-4xl font-['Manrope'] font-extrabold tracking-tight" data-key="title">Optimize Prompt</h2>
            <p class="text-slate-400 mt-2" data-key="subtitle">Compressing logic to save tokens.</p>
        </header>

        <div class="space-y-6">
            <textarea id="input" class="w-full h-64 bg-[#131b1b] border border-white/5 rounded-2xl p-6 focus:ring-2 focus:ring-[#4bdad8] outline-none" placeholder="Paste prompt here..."></textarea>
            
            <button onclick="process()" class="w-full bg-[#4bdad8] text-[#002d2d] py-5 rounded-2xl font-extrabold text-xl hover:brightness-110 active:scale-95 transition-all" data-key="btn-run">
                OPTIMIZE
            </button>

            <div id="result-box" class="hidden space-y-4 bg-white/5 p-6 rounded-2xl border border-white/10">
                <div id="output" class="text-[#bbf6f5] font-medium whitespace-pre-wrap"></div>
                <div class="flex gap-4">
                    <div class="flex-1 bg-black/20 p-3 rounded-lg text-center">
                        <label class="text-[9px] text-slate-500 font-bold block" data-key="stat-old">ORIGINAL</label>
                        <span id="stat-old" class="font-mono">0</span>
                    </div>
                    <div class="flex-1 bg-black/20 p-3 rounded-lg text-center">
                        <label class="text-[9px] text-slate-500 font-bold block" data-key="stat-new">NEW</label>
                        <span id="stat-new" class="font-mono text-[#4bdad8]">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const i18n = {
            en: {
                "mode-semantic": "Semantic", "mode-xml": "XML (Claude)", "mode-aggressive": "Aggressive",
                "lang-label": "LANGUAGE", "title": "Optimize Prompt", "subtitle": "Compressing logic to save tokens.",
                "btn-run": "OPTIMIZE", "stat-old": "ORIGINAL", "stat-new": "COMPRESSED"
            },
            ja: {
                "mode-semantic": "セマンティック", "mode-xml": "XML形式", "mode-aggressive": "徹底圧縮",
                "lang-label": "言語", "title": "プロンプト最適化", "subtitle": "トークンを節約します。",
                "btn-run": "実行する", "stat-old": "元サイズ", "stat-new": "圧縮後"
            }
        };

        let currentMode = 'semantic';
        let currentLang = 'en';

        // THE FIX: Direct DOM manipulation without relying on Tailwind classes for state
        function setLang(l) {
            currentLang = l;
            
            // Toggle Language Buttons
            document.getElementById('l-en').className = (l === 'en') ? 'lang-btn lang-active flex-1 py-2 text-[10px] font-bold rounded' : 'lang-btn flex-1 py-2 text-[10px] font-bold rounded text-slate-500';
            document.getElementById('l-ja').className = (l === 'ja') ? 'lang-btn lang-active flex-1 py-2 text-[10px] font-bold rounded' : 'lang-btn flex-1 py-2 text-[10px] font-bold rounded text-slate-500';

            // Translate Text
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (i18n[l][key]) el.innerText = i18n[l][key];
            });
        }

        function setMode(m) {
            currentMode = m;
            // Toggle Mode Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('btn-active');
                btn.classList.add('text-slate-400');
            });
            document.getElementById('m-' + m).classList.add('btn-active');
            document.getElementById('m-' + m).classList.remove('text-slate-400');
        }

        function process() {
            const input = document.getElementById('input').value;
            if(!input) return;
            
            let res = input;
            if(currentMode === 'aggressive') res = res.replace(/\b(the|a|an)\b/gi, "").replace(/\s\s+/g, ' ');
            if(currentMode === 'xml') res = `<ctx>${res}</ctx>\n<task>Do</task>`;
            
            document.getElementById('output').innerText = res;
            document.getElementById('stat-old').innerText = input.length;
            document.getElementById('stat-new').innerText = res.length;
            document.getElementById('result-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
